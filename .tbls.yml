# tbls configuration for Emulation File Manager
dsn: sqlite://database/data/db.sqlite
docPath: database/docs/schema

# Documentation settings
er:
  distance: 2
  format: svg

comments:
  - table: system
    tableComment: Platform/console systems (e.g., Commodore 64, Atari 2600)
  - table: emulator
    tableComment: Emulator configurations for running software on different systems
  - table: franchise
    tableComment: Game/software franchises (e.g., Zork, Jet Set Willy)
  - table: software_title
    tableComment: Individual software titles that can belong to a franchise
  - table: release
    tableComment: Specific releases of software (versions, editions, regions, compilations, different media)
  - table: file_info
    tableComment: Metadata about files including checksums and sizes
  - table: file_set
    tableComment: Collections of files that belong together
  - table: file_sync_log
    tableComment: Tracking log for file synchronization operations
  - table: setting
    tableComment: Application settings stored as key-value pairs
  - table: document_viewer
    tableComment: Configuration for external document viewers
